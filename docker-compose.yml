services:
  api:
    build: .
    command: >
      sh -c ".venv/bin/alembic upgrade head &&
             .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-local-secret-key}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-can_tracker}:${POSTGRES_PASSWORD:-can_tracker}@postgres:5432/${POSTGRES_DB:-can_tracker}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-change-me-local-pii-encryption-key}
      PII_SEARCH_HASH_KEY: ${PII_SEARCH_HASH_KEY:-change-me-local-pii-search-hash-key}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-can_tracker_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-can_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-can_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-can_tracker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
