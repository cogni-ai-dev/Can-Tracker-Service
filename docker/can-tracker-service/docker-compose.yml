services:
  can-tracker-service:
    image: can-tracker-service
    container_name: can-tracker-service

    build:
      context: ../..
      dockerfile: docker/can-tracker-service/service.Dockerfile

    restart: unless-stopped

    command: >
      sh -c ": \"$${APP_ENV:?APP_ENV is required}\" &&
             : \"$${APP_SECRET_KEY:?APP_SECRET_KEY is required}\" &&
             : \"$${DATABASE_URL:?DATABASE_URL is required}\" &&
             : \"$${PII_ENCRYPTION_KEY:?PII_ENCRYPTION_KEY is required}\" &&
             : \"$${PII_SEARCH_HASH_KEY:?PII_SEARCH_HASH_KEY is required}\" &&
             : \"$${SESSION_COOKIE_NAME:?SESSION_COOKIE_NAME is required}\" &&
             : \"$${SESSION_COOKIE_SECURE:?SESSION_COOKIE_SECURE is required}\" &&
             : \"$${CORS_ORIGINS:?CORS_ORIGINS is required}\" &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8002 --proxy-headers --forwarded-allow-ips \"$${FORWARDED_ALLOW_IPS:-127.0.0.1}\""

    environment:
      APP_ENV: ${APP_ENV:-}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-}

      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-can_tracker}

      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      PII_SEARCH_HASH_KEY: ${PII_SEARCH_HASH_KEY:-}

      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}

      CORS_ORIGINS: ${CORS_ORIGINS:-}

      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "${API_BIND:-0.0.0.0}:${API_PORT:-8002}:8002"

    read_only: true

    tmpfs:
      - /tmp

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
