services:
  postgres:
    container_name: can-postgres
    image: postgres:15.3-alpine
    restart: unless-stopped
    ports:
      - "5402:5432"
    environment:
      POSTGRES_DB: can
      POSTGRES_USER: can
      POSTGRES_PASSWORD: can
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb.sql:/docker-entrypoint-initdb.d/001-initdb.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U can -d can"]
      interval: 5s
      timeout: 5s
      retries: 10
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
