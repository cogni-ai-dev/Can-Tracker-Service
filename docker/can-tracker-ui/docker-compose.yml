services:
  can-tracker-ui:
    image: can-tracker-ui
    container_name: can-tracker-ui

    build:
      context: ../..
      dockerfile: docker/can-tracker-ui/service.Dockerfile

    restart: unless-stopped

    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://can-tracker-service:8002}
      NGINX_ENVSUBST_FILTER: "^API_UPSTREAM$"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - can-tracker-local

    ports:
      - "${UI_BIND:-0.0.0.0}:${UI_PORT:-3002}:8080"

    read_only: true

    tmpfs:
      - /tmp:uid=101,gid=101,mode=1777
      - /etc/nginx/conf.d:uid=101,gid=101,mode=0775
      - /var/cache/nginx:uid=101,gid=101,mode=0775
      - /run:uid=101,gid=101,mode=0775

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  can-tracker-local:
    name: can-tracker-local
    external: true
